<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Task Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#31D35C",
              secondary: "#2BB7DA",
            },
            fontFamily: {
              inter: "Inter",
              roba: "Roba",
            },
            keyframes: {
              gradientShift: {
                "0%, 100%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
              },
            },
            animation: {
              "gradient-move": "gradientShift 2s ease infinite",
              "logo-anim": "gradientShift 4s ease infinite",
            },
            backgroundSize: {
              "300%": "300% 300%",
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-inter">
    <!-- 
Neutral
Dark text: #1F2937 (gray-800)
Body text: #6B7280 (gray-500)
Background: #F9FAFB (gray-50)
White: #FFFFFF

Button gradient
from: #31D35C
to:   #2BB7DA 

Logo: TaskFlow
Nav: Features | Pricing | Testimonials | Contact
Button: Get Started
-->
    <!-- Header (nav + CTA) -->
    <header id="header">
      <!-- container -->
      <div
        class="container py-4 mx-auto lg:px-32 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="font-roba text-3xl text-primary select-none">
          <span
            class="bg-gradient-to-l from-primary via-cyan-500 bg-300% cursor-pointer to-primary text-transparent bg-clip-text select-none animate-logo-anim"
            >TaskFlow</span
          >
        </div>

        <!-- nav -->
        <nav>
          <ul class="flex items-center gap-8 text-gray-700 font-medium text-sm">
            <li class="group cursor-pointer">
              <a
                href="#"
                class="transition-all duration-300 group-hover:text-primary inline-block py-1"
                >Features</a
              >
              <div
                class="m-0 p-0 w-0 h-[0.1rem] bg-primary transition-all duration-300 group-hover:w-full"
              ></div>
            </li>
            <li class="group cursor-pointer">
              <a
                href="#"
                class="transition-all duration-300 group-hover:text-primary inline-block py-1"
                >Pricing</a
              >
              <div
                class="m-0 p-0 w-0 h-[0.1rem] bg-primary transition-all duration-300 group-hover:w-full"
              ></div>
            </li>
            <li class="group cursor-pointer">
              <a
                href="#"
                class="transition-all duration-300 group-hover:text-primary inline-block py-1"
                >Testimonials</a
              >
              <div
                class="m-0 p-0 w-0 h-[0.1rem] bg-primary transition-all duration-300 group-hover:w-full"
              ></div>
            </li>
            <li class="group cursor-pointer">
              <a
                href="#"
                class="transition-all duration-300 group-hover:text-primary inline-block py-1"
                >Contact</a
              >
              <div
                class="m-0 p-0 w-0 h-[0.1rem] bg-primary transition-all duration-300 group-hover:w-full"
              ></div>
            </li>
          </ul>
        </nav>
        <!-- CTA  -->
        <div>
          <button
            aria-label="get started"
            class="text-sm font-medium tracking-wider shadow-green-200 shadow-md bg-gradient-to-br from-primary via-secondary to-primary bg-300% text-gray-50 py-2 px-5 hover:bg-300% rounded-md transition-all duration-300 hover:shadow-green-200 hover:shadow-lg hover:animate-gradient-move"
          >
            Get Started
          </button>
        </div>
      </div>
    </header>
    <!-- Hero Section -->
    <section id="hero min-h-screen">
      <div
        class="container lg:px-32 mx-auto grid md:grid-cols-2 grid-cols-1 gap-y-10 md:gap-x-20 md:gap-y-0"
      >
        <!-- contwxt (deadline, description,cta)-->

        <div class="space-y-10 my-auto">
          <h1
            class="text-4xl md:text-3xl lg:text-4xl xl:text-5xl max-w-md mx-auto md:mx-0 lg:max-w-lg text-gray-800 font-semibold leading-tight tracking-tight text-center md:text-left"
          >
            Organize your work Focus on what matters
          </h1>
          <p
            class="leading-relaxed text-gray-500 text-md text-center md:text-left"
          >
            TaskFlow helps teams manage tasks, track progress, and collaborate —
            all in one simple platform.
          </p>
          <div class="flex justify-center md:justify-start items-center gap-4">
            <button
              title="get started"
              aria-label="get started"
              class="tracking-wider text-sm font-medium shadow-green-100 shadow-md bg-gradient-to-br from-primary via-secondary to-primary bg-300% text-gray-50 py-2 px-5 rounded-md transition-all duration-300 hover:shadow-green-100 hover:shadow-lg hover:animate-gradient-move"
            >
              Get Started
            </button>
            <button
              title="click to learn more about taskflow"
              aria-label="learn more"
              class="relative text-sm overflow-hidden border border-primary px-5 py-2 rounded-md shadow-green-100 hover:shadow-green-100 hover:shadow-lg shadow-md group"
            >
              <span
                class="tracking-wider relative text-primary transition-all duration-500 z-20 group-hover:text-green-50 font-medium"
                >Learn more</span
              >
              <div
                class="top-0 bottom-0 left-0 right-0 z-10 bg-gradient-to-tr from-primary via-secondary to-primary bg-300% transition-all duration-500 hover:animate-gradient-move absolute ease-in-out w-0 group-hover:w-full"
              ></div>
            </button>
          </div>
        </div>
        <!-- image -->
        <div class="">
          <img src="assets/images/image-Hero.png" alt="task managment image" />
        </div>
      </div>
    </section>
  </body>
</html>
